name: Deploy & Release

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create Talo Config
        run: |
          mkdir -p addons/talo
          cat << 'EOF' > addons/talo/settings.cfg
          access_key="${{ secrets.TALO_ACCESS_KEY }}"
          api_url="https://api.trytalo.com"
          socket_url="wss://api.trytalo.com"
          auto_connect_socket=true
          handle_tree_quit=true
          cache_player_on_identify=true
          debounce_timer_seconds=1.0

          [continuity]

          enabled=true

          [player_auth]

          auto_start_session=true

          [verification]

          enabled=false
          key_version=""
          key_value=""
          EOF

      - name: Setup Godot Engine
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: true

      - name: Create Build Directories
        run: |
          mkdir -p build/web
          mkdir -p build/windows

      - name: Export Web Build
        run: godot --headless --export-release "Web" build/web/index.html

      - name: Export Windows Desktop Build
        run: godot --headless --export-release "Windows Desktop" build/windows/Motion.exe

      - name: Package Windows Build
        run: |
          cd build/windows
          zip -r ../../Motion-Windows.zip .

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        with:
          publish-dir: './build/web'
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-pull-request-comment: true
          overwrites-pull-request-comment: true
          deploy-message: "Deploy from GitHub Actions (Commit: ${{ github.sha }})"

      - name: Update Latest GitHub Release (Main Branch Only)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: "Latest Build"
          body: "This release contains the latest Windows build from the main branch."
          draft: false
          prerelease: true
          files: |
            Motion-Windows.zip
